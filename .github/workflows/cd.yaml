name: CD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Deploy Frontend Assets
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      STACK_NAME: ${{ vars.CFN_STACK_NAME }}
      ENABLE_CF_INVALIDATION: ${{ vars.ENABLE_CF_INVALIDATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static assets
        run: npm run build

      - name: Verify static output directory
        run: |
          if [ ! -d "out" ]; then
            echo "Static output directory 'out' was not found."
            echo "Set output: 'export' in next.config.ts for static hosting."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve stack outputs
        id: stack
        shell: bash
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)

          if [ -z "$BUCKET_NAME" ] || [ "$BUCKET_NAME" = "None" ]; then
            echo "BucketName output was not found in stack $STACK_NAME"
            exit 1
          fi

          if [ -z "$DISTRIBUTION_ID" ] || [ "$DISTRIBUTION_ID" = "None" ]; then
            echo "DistributionId output was not found in stack $STACK_NAME"
            exit 1
          fi

          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"

      - name: Upload immutable assets
        run: |
          aws s3 sync out/_next/static "s3://${{ steps.stack.outputs.bucket_name }}/_next/static" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload non-HTML files
        run: |
          aws s3 sync out "s3://${{ steps.stack.outputs.bucket_name }}" \
            --delete \
            --exclude "*.html" \
            --exclude "_next/static/*" \
            --cache-control "public,max-age=86400"

      - name: Upload HTML files
        run: |
          aws s3 sync out "s3://${{ steps.stack.outputs.bucket_name }}" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront cache (optional)
        if: env.ENABLE_CF_INVALIDATION == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.distribution_id }}" \
            --paths "/*"
